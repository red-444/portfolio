<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Demo - Sivabharathi M</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .demo-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
        }
        .demo-title {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        .demo-subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }
        .demo-features {
            text-align: left;
            margin: 30px 0;
        }
        .feature-item {
            display: flex;
            align-items: center;
            margin: 15px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .feature-icon {
            font-size: 1.5rem;
            margin-right: 15px;
            color: #667eea;
        }
        .demo-buttons {
            margin-top: 30px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="demo-container">
        <h1 class="demo-title">🚀 Portfolio Demo</h1>
        <p class="demo-subtitle">Professional AI & ML Developer Portfolio</p>
        
        <div class="demo-features">
            <div class="feature-item">
                <i class="fas fa-moon feature-icon"></i>
                <span>Dark/Light Theme Toggle</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-mobile-alt feature-icon"></i>
                <span>Fully Responsive Design</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-download feature-icon"></i>
                <span>PDF Resume Download</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-envelope feature-icon"></i>
                <span>Contact Form with Email</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-robot feature-icon"></i>
                <span>AI-Powered Animations</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-palette feature-icon"></i>
                <span>Modern Professional Design</span>
            </div>
        </div>
        
        <div class="demo-buttons">
            <a href="index.html" class="btn">View Portfolio</a>
            <a href="https://github.com/sivabharathi/portfolio" class="btn btn-secondary">View Source</a>
        </div>
        
        <p style="margin-top: 30px; color: #666; font-size: 0.9rem;">
            Built with HTML5, CSS3, JavaScript, and AI-powered features
        </p>
    </div>
</body>
</html>
